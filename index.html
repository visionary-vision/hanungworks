<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI 동물상 테스트</title>
    <link rel="stylesheet" href="animal.css">
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>
</head>
<body>
    <div class="container">
        <header>
            <div class="logo">🐶 AI Face Test</div>
            <h1>인공지능 동물상 테스트</h1>
            <p>얼굴 사진을 올려 닮은 동물을 찾아보세요!</p>
        </header>

        <main class="test-card">
            <!-- 사진 업로드 영역 -->
            <div id="upload-container">
                <label for="image-upload" class="upload-box" id="drop-zone">
                    <div class="upload-icon">📁</div>
                    <div class="upload-text">
                        <strong>클릭하거나 사진을 이곳에 끌어다 놓으세요</strong>
                        <span>JPG, PNG 파일 지원</span>
                    </div>
                    <input type="file" id="image-upload" accept="image/*" onchange="handleImageUpload(event)" style="display:none;">
                </label>
                <button type="button" class="btn-webcam-link" onclick="initWebcam()">카메라로 직접 찍기</button>
            </div>

            <!-- 분석 및 결과 화면 -->
            <div id="result-area" class="hidden">
                <div class="preview-wrapper">
                    <div id="webcam-container" class="hidden"></div>
                    <img id="image-preview" src="#" alt="Preview">
                </div>
                
                <div id="loading" class="loading-spinner hidden">
                    <div class="spinner"></div>
                    <p>AI가 분석 중입니다...</p>
                </div>

                <div id="analysis-result" class="hidden">
                    <h2 id="top-result-title">분석 결과</h2>
                    <div id="label-container"></div>
                    <button type="button" class="btn-restart" onclick="window.location.reload()">다른 사진으로 테스트</button>
                </div>
            </div>
        </main>

        <footer>
            <p>© 2026 HanungWorks AI. All rights reserved.</p>
        </footer>
    </div>

    <script src="animal.js"></script>
</body>
</html>
