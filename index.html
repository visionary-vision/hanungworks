<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>맛집 추천 지도</title>
    <link rel="stylesheet" href="style.css">
    <!-- Kakao Maps API -->
    <script type="text/javascript" src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=08b440369b07ebe8285ba4f6399ef209&libraries=services"></script>
</head>
<body>
    <!-- 1. 시작 화면: 위치 입력 -->
    <div id="start-screen">
        <div class="start-content">
            <div class="logo">🍴 맛집지도</div>
            <h1>어느 지역으로 가시나요?</h1>
            <p>궁금한 지역이나 장소를 입력하면 맛집을 찾아드릴게요.</p>
            <form id="start-form">
                <input type="text" id="start-location" placeholder="예: 강남역, 제주도, 홍대" required autofocus>
                <button type="submit">지도에서 찾기</button>
            </form>
        </div>
    </div>

    <!-- 2. 지도 영역 -->
    <div id="map"></div>
    
    <!-- 3. 카테고리 선택 (지도 위에 플로팅) -->
    <div id="category-menu" class="hidden">
        <div class="category-title">어떤 음식을 찾으세요?</div>
        <div class="category-buttons">
            <button type="button" class="category-btn" data-query="한식">🍚 한식</button>
            <button type="button" class="category-btn" data-query="중식">🍜 중식</button>
            <button type="button" class="category-btn" data-query="일식">🍣 일식</button>
            <button type="button" class="category-btn" data-query="카페">☕ 카페</button>
        </div>
        <button type="button" id="re-search-btn">🔙 지역 다시 입력</button>
    </div>

    <!-- 4. 검색 결과 목록 (사이드바) -->
    <div id="sidebar" class="hidden">
        <div class="sidebar-header">
            <span id="current-location-text"></span> 검색 결과
            <button id="close-sidebar">×</button>
        </div>
        <div id="places-list"></div>
        <div id="pagination"></div>
    </div>

    <script src="main.js"></script>
</body>
</html>
