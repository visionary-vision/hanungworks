<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI 동물상 테스트</title>
    <link rel="stylesheet" href="animal.css">
    <!-- TensorFlow & Teachable Machine Libraries -->
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>
</head>
<body>
    <div class="container">
        <!-- 헤더 섹션 -->
        <header>
            <div class="logo">🐶 AI Face Test</div>
            <h1>인공지능 동물상 테스트</h1>
            <p>나의 얼굴은 어떤 동물을 닮았을까?</p>
        </header>

        <!-- 메인 카드 -->
        <main class="test-card">
            <!-- 테스트 시작 전 화면 -->
            <div id="upload-area" class="upload-area">
                <div class="icon">📸</div>
                <p>사진을 업로드하거나<br>실시간 카메라로 테스트하세요.</p>
                <div class="button-group">
                    <button type="button" class="btn-primary" onclick="initWebcam()">실시간 카메라 시작</button>
                    <label for="image-upload" class="btn-secondary">사진 업로드</label>
                    <input type="file" id="image-upload" accept="image/*" onchange="handleImageUpload(event)" style="display:none;">
                </div>
            </div>

            <!-- 분석 중/결과 화면 -->
            <div id="result-area" class="hidden">
                <div id="webcam-container"></div>
                <img id="image-preview" class="hidden" src="#" alt="Preview">
                
                <div id="loading" class="loading-spinner hidden">
                    <div class="spinner"></div>
                    <p>AI가 얼굴을 분석 중입니다...</p>
                </div>

                <div id="analysis-result" class="hidden">
                    <h2 id="top-result-title">당신은 강아지상!</h2>
                    <div id="label-container">
                        <!-- 결과 프로그레스 바가 여기에 생성됩니다 -->
                    </div>
                    <button type="button" class="btn-restart" onclick="window.location.reload()">다시 하기</button>
                </div>
            </div>
        </main>

        <footer>
            <p>© 2026 HanungWorks AI. All rights reserved.</p>
        </footer>
    </div>

    <script src="animal.js"></script>
</body>
</html>
